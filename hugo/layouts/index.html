<!-- hugo/layouts/index.html -->
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock Sentinel 决策中心</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 80px auto; padding: 0 20px; }
    h1 { text-align: center; margin-bottom: 50px; }
    .cards { display: flex; justify-content: space-around; gap: 20px; flex-wrap: wrap; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 30px; width: 40%; min-width: 240px; text-align: center; }
    .card h2 { margin-top: 0; }
    .btn { display: inline-block; margin-top: 12px; padding: 8px 20px; background: #333; color: #fff; text-decoration: none; border-radius: 4px; }
    .arch { display: block; margin-top: 10px; font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <div class="cards">
    {{ range .Site.Sections }}
      <div class="card">
        <h2>{{ .Params.icon }} {{ .Params.display_name | default .Title }}</h2>
        <p>{{ .Description }}</p>
        <a class="btn" href="{{ .RelPermalink }}">进入页面</a>

        {{ with .GetPage "archives" }}
          <a class="arch" href="{{ .RelPermalink }}">📅 历史归档</a>
        {{ end }}
      </div>
    {{ end }}
  </div>
</body>
</html>
